services:
  db:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: filebridge
      MYSQL_USER: filebridge
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-filebridge}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ufilebridge", "-pfilebridge"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      APP_SECRET: ${APP_SECRET:-change-me-to-a-long-random-string}
      DOMAIN: ${DOMAIN}
      DATABASE_URL: mysql://filebridge:${MYSQL_PASSWORD:-filebridge}@db:3306/filebridge
      OWNER_EMAIL: ${OWNER_EMAIL:-admin@example.com}
      PORT: 3000
      HOST: 0.0.0.0
      NODE_ENV: production
      DB_HOST: db
      DB_USER: filebridge
      DB_PASS: ${MYSQL_PASSWORD:-filebridge}
      DB_NAME: filebridge
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  mysql_data:
  caddy_data:
  caddy_config: